<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
  <title>Sassy Brain</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b; --surface: #18181b; --surface2: #27272a; --surface3: #3f3f46;
      --border: #3f3f46; --text: #fafafa; --text2: #a1a1aa; --text3: #71717a;
      --accent: #f97316; --accent2: #ea580c;
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
      --slot-a: #d97706; --slot-b: #3b82f6;
      --radius: 10px;
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top bar ────────────────────────────────────────── */
    .topbar {
      height: 40px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 12px; gap: 10px;
      -webkit-app-region: drag; flex-shrink: 0;
    }
    .topbar-logo {
      font-family: var(--mono); font-weight: 700; font-size: 13px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar-ver { font-family: var(--mono); font-size: 10px; color: var(--text3); }
    .topbar-spacer { flex: 1; }
    .topbar-btn {
      -webkit-app-region: no-drag; background: none; border: none;
      color: var(--text2); cursor: pointer; padding: 4px 10px;
      font-size: 11px; font-family: var(--mono); transition: color 0.2s;
    }
    .topbar-btn:hover { color: var(--text); }

    /* ── Slot configuration row ────────────────────────── */
    .slot-config {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .slot-cfg {
      background: var(--surface); padding: 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .slot-cfg.a { border-top: 2px solid var(--slot-a); }
    .slot-cfg.b { border-top: 2px solid var(--slot-b); }
    .slot-cfg-head {
      display: flex; align-items: center; gap: 8px;
    }
    .slot-badge {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
    }
    .slot-badge.a { background: var(--slot-a); color: white; }
    .slot-badge.b { background: var(--slot-b); color: white; }
    .slot-status {
      font-family: var(--mono); font-size: 10px; color: var(--text3);
      margin-left: auto;
    }
    .slot-status.streaming { color: var(--green); }
    .slot-status.error { color: var(--red); }
    .slot-metrics {
      font-family: var(--mono); font-size: 10px; color: var(--text3);
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .slot-metrics span.m-label { color: var(--text3); }
    .slot-metrics span.m-val { color: var(--text); }
    .slot-cfg-row {
      display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px;
    }
    .slot-cfg-row select,
    .slot-cfg-row input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; color: var(--text);
      font-family: var(--mono); font-size: 11px; outline: none;
    }
    .slot-cfg-row select:focus,
    .slot-cfg-row input:focus { border-color: var(--accent); }
    .btn-overlay {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; color: var(--text2);
      cursor: pointer; font-family: var(--mono); font-size: 10px;
      white-space: nowrap; transition: all 0.2s;
    }
    .btn-overlay:hover { color: var(--text); border-color: var(--accent); }
    .btn-overlay.active { color: var(--accent); border-color: var(--accent); }

    /* ── Overlay editor (collapsible) ──────────────────── */
    .overlay-editor {
      display: none; background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 14px 12px 14px;
    }
    .overlay-editor.show { display: block; }
    .overlay-editor .oe-hint {
      font-family: var(--mono); font-size: 10px;
      color: var(--text3); margin-bottom: 5px;
    }
    .overlay-editor textarea {
      width: 100%; min-height: 100px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; color: var(--text);
      font-family: var(--mono); font-size: 11px; outline: none;
      resize: vertical;
    }
    .overlay-editor textarea:focus { border-color: var(--accent); }
    .oe-row { display: flex; gap: 8px; margin-top: 6px; }
    .oe-row button {
      padding: 4px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); cursor: pointer;
      font-family: var(--mono); font-size: 10px;
    }
    .oe-row button:hover { background: var(--border); }
    .oe-status {
      font-family: var(--mono); font-size: 10px;
      margin-left: auto; align-self: center;
    }
    .oe-status.ok { color: var(--green); }
    .oe-status.err { color: var(--red); }

    /* ── Transcript (side-by-side columns) ─────────────── */
    .transcript {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border); overflow: hidden;
    }
    .col {
      background: var(--bg); overflow-y: auto;
      padding: 14px 16px;
    }
    .turn {
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid var(--surface2);
    }
    .turn:last-child { border-bottom: none; }
    .turn-head {
      font-family: var(--mono); font-size: 10px;
      color: var(--text3); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .turn-body {
      font-size: 13px; line-height: 1.55; color: var(--text);
      word-wrap: break-word; overflow-wrap: anywhere;
    }
    .turn-user .turn-head { color: var(--accent); }
    .turn-ai .turn-head.a { color: var(--slot-a); }
    .turn-ai .turn-head.b { color: var(--slot-b); }
    .turn-error .turn-head { color: var(--red); }
    .turn-error .turn-body { color: var(--red); font-family: var(--mono); font-size: 12px; white-space: pre-wrap; }
    .turn-foot {
      display: flex; gap: 10px; margin-top: 6px;
      font-family: var(--mono); font-size: 10px; color: var(--text3);
      align-items: center;
    }
    .turn-foot .metric { color: var(--text2); }
    .turn-foot .raw-btn {
      margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); padding: 2px 8px; border-radius: 4px;
      cursor: pointer; font-family: var(--mono); font-size: 10px;
    }
    .turn-foot .raw-btn:hover { color: var(--text); border-color: var(--accent); }
    .turn-raw {
      display: none; margin-top: 6px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font-family: var(--mono); font-size: 11px;
      color: var(--text); white-space: pre-wrap; overflow-x: auto;
      max-height: 400px; overflow-y: auto;
    }
    .turn-raw.show { display: block; }
    .turn-body pre {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px; margin: 6px 0;
      overflow-x: auto; font-family: var(--mono); font-size: 12px;
    }
    .turn-body code {
      background: var(--surface); padding: 1px 5px; border-radius: 3px;
      font-family: var(--mono); font-size: 12px;
    }
    .typing-cursor {
      color: var(--accent); animation: blink 1s infinite;
    }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

    .empty-state {
      color: var(--text3); font-family: var(--mono);
      font-size: 12px; text-align: center; padding: 60px 20px;
      line-height: 1.7;
    }
    .empty-state strong { color: var(--text2); }

    /* ── Prompt bar ────────────────────────────────────── */
    .prompt-bar {
      flex-shrink: 0; background: var(--surface);
      border-top: 1px solid var(--border); padding: 10px 14px;
    }
    .prompt-row { display: flex; gap: 8px; align-items: flex-end; }
    #prompt-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text);
      font-family: var(--font); font-size: 13px; outline: none;
      resize: none; min-height: 40px; max-height: 200px;
      line-height: 1.5;
    }
    #prompt-input:focus { border-color: var(--accent); }
    .btn-send {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 8px; color: white;
      font-weight: 700; font-size: 13px; cursor: pointer;
      font-family: var(--font); letter-spacing: 0.4px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(249,115,22,0.3); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-stop {
      padding: 10px 16px; background: var(--surface2);
      border: 1px solid var(--red); border-radius: 8px;
      color: var(--red); cursor: pointer;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
    }
    .prompt-hint {
      font-family: var(--mono); font-size: 10px;
      color: var(--text3); margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">SASSY BRAIN</div>
    <div class="topbar-ver" id="ver"></div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="newSession()">new session</button>
    <button class="topbar-btn" onclick="toSetup()">keys</button>
  </div>

  <!-- Slot configuration -->
  <div class="slot-config">
    <div class="slot-cfg a">
      <div class="slot-cfg-head">
        <span class="slot-badge a">SLOT A</span>
        <span class="slot-metrics" id="metrics-a"></span>
        <span class="slot-status" id="status-a">idle</span>
      </div>
      <div class="slot-cfg-row">
        <select id="provider-a"></select>
        <input id="model-a" placeholder="model" list="models-a" spellcheck="false">
        <datalist id="models-a"></datalist>
        <button class="btn-overlay" id="overlay-btn-a" onclick="toggleOverlay('a')">{ JSON }</button>
      </div>
    </div>
    <div class="slot-cfg b">
      <div class="slot-cfg-head">
        <span class="slot-badge b">SLOT B</span>
        <span class="slot-metrics" id="metrics-b"></span>
        <span class="slot-status" id="status-b">idle</span>
      </div>
      <div class="slot-cfg-row">
        <select id="provider-b"></select>
        <input id="model-b" placeholder="model" list="models-b" spellcheck="false">
        <datalist id="models-b"></datalist>
        <button class="btn-overlay" id="overlay-btn-b" onclick="toggleOverlay('b')">{ JSON }</button>
      </div>
    </div>
  </div>

  <!-- Overlay editors (hidden until toggled) -->
  <div class="overlay-editor" id="overlay-a">
    <div class="oe-hint">
      Slot A — JSON object merged into every request body (e.g.
      <code>{"temperature":0.7,"top_p":0.9}</code>). Applies from first prompt onward.
    </div>
    <textarea id="overlay-text-a" spellcheck="false" placeholder='{"temperature": 0.7}'></textarea>
    <div class="oe-row">
      <button onclick="saveOverlay('a')">Save</button>
      <button onclick="clearOverlay('a')">Clear</button>
      <span class="oe-status" id="oe-status-a"></span>
    </div>
  </div>
  <div class="overlay-editor" id="overlay-b">
    <div class="oe-hint">
      Slot B — JSON object merged into every request body. Applies from first prompt onward.
    </div>
    <textarea id="overlay-text-b" spellcheck="false" placeholder='{"temperature": 0.7}'></textarea>
    <div class="oe-row">
      <button onclick="saveOverlay('b')">Save</button>
      <button onclick="clearOverlay('b')">Clear</button>
      <span class="oe-status" id="oe-status-b"></span>
    </div>
  </div>

  <!-- Side-by-side transcript -->
  <div class="transcript">
    <div class="col" id="col-a"></div>
    <div class="col" id="col-b"></div>
  </div>

  <!-- Prompt bar -->
  <div class="prompt-bar">
    <div class="prompt-row">
      <select id="role-select" style="margin-right:8px;">
        <option value="user">User</option>
        <option value="assistant">Assistant</option>
      </select>
      <textarea id="prompt-input" placeholder="Prompt both slots in parallel… (Enter = send, Shift+Enter = newline)"></textarea>
      <button class="btn-send" id="btn-send" onclick="send()">Send</button>
      <button class="btn-stop" id="btn-stop" style="display:none" onclick="stopAll()">STOP</button>
    </div>
    <div class="prompt-row" id="system-row" style="margin-top:6px;display:none;">
      <input id="system-input" placeholder="System message (optional, for Anthropic/Gemini)" style="width:100%;font-size:12px;padding:4px 8px;" />
    </div>
    <div class="prompt-hint" id="hint">
      ready
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Sassy Brain — renderer (dev testing tool)
// ═══════════════════════════════════════════════════════════════════

let PROVIDERS = [];
let providerById = {};
let chatHistoryA = [];   // [{role,content}] per slot
let chatHistoryB = [];
let activeStreams = new Set(); // signal_ids in flight
let signalCounter = 0;
let currentSlotSignals = { a: null, b: null }; // map slot → active signal id
let currentSlotBuffers = { a: '', b: '' };
let currentSlotBodyEls = { a: null, b: null };
let currentSlotTurnEls = { a: null, b: null }; // the whole .turn wrapper
let sessionTotals = { a: { in: 0, out: 0, ms: 0, turns: 0 }, b: { in: 0, out: 0, ms: 0, turns: 0 } };

// ── DOM helpers ─────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function renderMarkdown(text) {
  // escape FIRST so AI output cannot inject tags; then synth our own.
  const esc = escapeHtml(text);
  return esc
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function setStatus(slot, text, kind) {
  const el = $(`status-${slot}`);
  if (!el) return;
  el.textContent = text;
  el.className = 'slot-status' + (kind ? ' ' + kind : '');
}

function appendTurn(slot, role, providerId, text) {
  const col = $(`col-${slot}`);
  const empty = col.querySelector('.empty-state');
  if (empty) empty.remove();

  const wrap = document.createElement('div');
  wrap.className = 'turn ' + (role === 'user' ? 'turn-user' : role === 'error' ? 'turn-error' : 'turn-ai');

  const head = document.createElement('div');
  head.className = 'turn-head' + (role === 'ai' ? ' ' + slot : '');
  head.textContent = role === 'user' ? 'you' :
                     role === 'error' ? 'error' :
                     (providerById[providerId] && providerById[providerId].label) || providerId;
  const body = document.createElement('div');
  body.className = 'turn-body';

  if (role === 'user' || role === 'error') {
    body.textContent = text; // fully escaped via textContent
  } else {
    // Streaming AI output rendered as safe markdown.
    body.innerHTML = renderMarkdown(text || '') +
      '<span class="typing-cursor">▊</span>';
  }

  wrap.appendChild(head);
  wrap.appendChild(body);
  col.appendChild(wrap);
  col.scrollTop = col.scrollHeight;

  // Remember the wrapper for AI turns so finalize can attach the
  // metrics footer + raw-text toggle after streaming completes.
  if (role === 'ai') currentSlotTurnEls[slot] = wrap;

  return body;
}

function finalizeBody(bodyEl, text) {
  if (!bodyEl) return;
  bodyEl.innerHTML = renderMarkdown(text || '');
}

function fmtMs(ms) {
  if (!ms && ms !== 0) return '—';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

function attachTurnFooter(slot, meta, rawText) {
  const wrap = currentSlotTurnEls[slot];
  if (!wrap) return;
  const foot = document.createElement('div');
  foot.className = 'turn-foot';

  const latency = (meta && meta.endedAt && meta.startedAt)
    ? meta.endedAt - meta.startedAt : null;
  const ttfb = (meta && meta.firstChunkAt && meta.startedAt)
    ? meta.firstChunkAt - meta.startedAt : null;

  const parts = [];
  if (latency != null) parts.push(`total ${fmtMs(latency)}`);
  if (ttfb != null) parts.push(`ttfb ${fmtMs(ttfb)}`);
  if (meta && typeof meta.input === 'number') parts.push(`in ${meta.input}`);
  if (meta && typeof meta.output === 'number') parts.push(`out ${meta.output}`);
  if (meta && meta.finishReason) parts.push(`stop:${meta.finishReason}`);

  const metricSpan = document.createElement('span');
  metricSpan.className = 'metric';
  metricSpan.textContent = parts.join(' · ') || '(no metrics)';
  foot.appendChild(metricSpan);

  const rawBtn = document.createElement('button');
  rawBtn.className = 'raw-btn';
  rawBtn.textContent = '[raw]';
  const rawBlock = document.createElement('pre');
  rawBlock.className = 'turn-raw';
  rawBlock.textContent = rawText || '';
  rawBtn.addEventListener('click', () => {
    rawBlock.classList.toggle('show');
    rawBtn.textContent = rawBlock.classList.contains('show') ? '[hide raw]' : '[raw]';
  });
  foot.appendChild(rawBtn);

  wrap.appendChild(foot);
  wrap.appendChild(rawBlock);
}

function renderSlotMetrics(slot) {
  const t = sessionTotals[slot];
  const el = $(`metrics-${slot}`);
  if (!el) return;
  if (t.turns === 0) { el.textContent = ''; return; }
  const avgMs = Math.round(t.ms / t.turns);
  el.innerHTML =
    `<span class="m-label">Σ</span> <span class="m-val">${t.turns}t</span>` +
    ` <span class="m-label">in</span> <span class="m-val">${t.in}</span>` +
    ` <span class="m-label">out</span> <span class="m-val">${t.out}</span>` +
    ` <span class="m-label">avg</span> <span class="m-val">${fmtMs(avgMs)}</span>`;
}

// ── Slot configuration ──────────────────────────────────────
async function loadProviders() {
  PROVIDERS = await window.sassy.providers.list();
  providerById = Object.fromEntries(PROVIDERS.map(p => [p.id, p]));

  const has = await window.sassy.keys.has();
  for (const slot of ['a', 'b']) {
    const sel = $(`provider-${slot}`);
    for (const p of PROVIDERS) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.label + (p.needsKey && !has[p.id] ? ' (no key)' : '');
      opt.disabled = p.needsKey && !has[p.id];
      sel.appendChild(opt);
    }
    sel.addEventListener('change', () => onProviderChange(slot));
    $(`model-${slot}`).addEventListener('change', () => onModelChange(slot));
  }
}

function populateModelDatalist(slot, providerId) {
  const p = providerById[providerId];
  const dl = $(`models-${slot}`);
  dl.innerHTML = '';
  if (!p) return;
  for (const m of p.models) {
    const opt = document.createElement('option');
    opt.value = m;
    dl.appendChild(opt);
  }
  const modelInput = $(`model-${slot}`);
  if (!modelInput.value) modelInput.placeholder = p.defaultModel;
}

async function onProviderChange(slot) {
  const sel = $(`provider-${slot}`);
  const providerId = sel.value;
  populateModelDatalist(slot, providerId);
  $(`model-${slot}`).value = '';
  await window.sassy.prefs.set(slot === 'a' ? 'slotA' : 'slotB', providerId);
  await window.sassy.prefs.set(slot === 'a' ? 'modelA' : 'modelB', '');
}

async function onModelChange(slot) {
  await window.sassy.prefs.set(slot === 'a' ? 'modelA' : 'modelB', $(`model-${slot}`).value);
}

// ── Overlay editors ─────────────────────────────────────────
function toggleOverlay(slot) {
  $(`overlay-${slot}`).classList.toggle('show');
  $(`overlay-btn-${slot}`).classList.toggle('active');
}

async function saveOverlay(slot) {
  const provider = $(`provider-${slot}`).value;
  const text = $(`overlay-text-${slot}`).value;
  const status = $(`oe-status-${slot}`);
  const res = await window.sassy.session.setOverlay(provider, text);
  if (res && res.error) {
    status.textContent = '✗ ' + res.error;
    status.className = 'oe-status err';
    return;
  }
  if (res && res.cleared) {
    status.textContent = '✓ cleared';
  } else {
    status.textContent = '✓ overlay active for this session';
  }
  status.className = 'oe-status ok';
  $(`overlay-btn-${slot}`).classList.add('active');
  setTimeout(() => { status.textContent = ''; status.className = 'oe-status'; }, 3000);
}

async function clearOverlay(slot) {
  const provider = $(`provider-${slot}`).value;
  $(`overlay-text-${slot}`).value = '';
  await window.sassy.session.setOverlay(provider, '');
  const status = $(`oe-status-${slot}`);
  status.textContent = '✓ cleared';
  status.className = 'oe-status ok';
  $(`overlay-btn-${slot}`).classList.remove('active');
  setTimeout(() => { status.textContent = ''; status.className = 'oe-status'; }, 3000);
}

// ── Send pipeline ───────────────────────────────────────────
async function send() {
  const input = $('prompt-input');
  const text = input.value.trim();
  const maxLen = 4000;
  const forbidden = [
    /<script/i,
    /<iframe/i,
    /<img/i,
    /onerror=/i,
    /onload=/i
  ];
  if (!text) {
    $('hint').textContent = 'Prompt cannot be empty.';
    return;
  }
  if (text.length > maxLen) {
    $('hint').textContent = `Prompt too long (max ${maxLen} chars).`;
    return;
  }
  if (forbidden.some(r => r.test(text))) {
    $('hint').textContent = 'Prompt contains forbidden content.';
    return;
  }
  if (activeStreams.size > 0) return; // already running

  input.value = '';
  autoResize(input);

  const slotA = { slot: 'a', provider: $('provider-a').value, model: $('model-a').value.trim(), history: chatHistoryA };
  const slotB = { slot: 'b', provider: $('provider-b').value, model: $('model-b').value.trim(), history: chatHistoryB };

  // Get selected role
  const role = $('role-select').value;
  // Get system message if needed
  const systemMsg = $('system-input').value.trim();

  // Record turn in both columns and both histories with selected role
  appendTurn('a', role, null, text);
  appendTurn('b', role, null, text);
  chatHistoryA.push({ role, content: text });
  chatHistoryB.push({ role, content: text });

  // Add system message to history if provider supports it and present
  for (const slot of [slotA, slotB]) {
    const provider = slot.provider;
    if ((providerById[provider] && (providerById[provider].kind === 'anthropic' || providerById[provider].kind === 'gemini')) && systemMsg) {
      // Only add if not already present as first message
      if (!slot.history.length || slot.history[0].role !== 'system') {
        slot.history.unshift({ role: 'system', content: systemMsg });
      }
    }
  }

  $('btn-send').disabled = true;
  $('btn-stop').style.display = '';
  $('hint').textContent = 'streaming…';

  // Fire both in parallel
  await Promise.all([runSlot(slotA), runSlot(slotB)]);

  $('btn-send').disabled = false;
  $('btn-stop').style.display = 'none';
  $('hint').textContent = 'ready';
// Show/hide system message input based on provider
function updateSystemRow() {
  const pa = $('provider-a').value;
  const pb = $('provider-b').value;
  const show = [pa, pb].some(pid => providerById[pid] && (providerById[pid].kind === 'anthropic' || providerById[pid].kind === 'gemini'));
  $('system-row').style.display = show ? '' : 'none';
}

}

async function runSlot({ slot, provider, model, history }) {
  if (!provider) return;
  setStatus(slot, 'dispatching…', 'streaming');

  const sid = `s${++signalCounter}${slot}`;
  activeStreams.add(sid);
  currentSlotSignals[slot] = sid;
  currentSlotBuffers[slot] = '';
  currentSlotBodyEls[slot] = appendTurn(slot, 'ai', provider, '');

  const messages = history.map(m => ({ role: m.role, content: m.content }));

  let result;
  try {
    result = await window.sassy.ai.stream({
      provider,
      model: model || undefined,
      messages,
      signal_id: sid
    });
  } catch (err) {
    currentSlotBodyEls[slot].parentElement.remove();
    appendTurn(slot, 'error', provider, 'Request failed: ' + (err.message || err));
    setStatus(slot, 'error', 'error');
    activeStreams.delete(sid);
    $('hint').textContent = 'Error: ' + (err.message || err);
    return;
  }

  if (result && result.error) {
    currentSlotBodyEls[slot].parentElement.remove();
    appendTurn(slot, 'error', provider, result.error);
    setStatus(slot, 'error', 'error');
    activeStreams.delete(sid);
    $('hint').textContent = 'Error: ' + result.error;
    return;
  }

  // wait for onDone (also handled globally); fallback safety timeout 5 min
  const startedAt = Date.now();
  while (activeStreams.has(sid) && Date.now() - startedAt < 5 * 60 * 1000) {
    await sleep(60);
  }
  if (activeStreams.has(sid)) activeStreams.delete(sid);

  if (currentSlotBuffers[slot]) {
    history.push({ role: 'assistant', content: currentSlotBuffers[slot] });
  }
  setStatus(slot, 'idle');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function stopAll() {
  for (const slot of ['a', 'b']) {
    const sid = currentSlotSignals[slot];
    if (sid) await window.sassy.ai.abort(sid);
  }
  activeStreams.clear();
  $('btn-send').disabled = false;
  $('btn-stop').style.display = 'none';
  $('hint').textContent = 'stopped';
  setStatus('a', 'idle'); setStatus('b', 'idle');
}

// ── Session management ──────────────────────────────────────
async function newSession() {
  // Abort anything in flight
  for (const slot of ['a', 'b']) {
    const sid = currentSlotSignals[slot];
    if (sid) await window.sassy.ai.abort(sid);
  }
  activeStreams.clear();
  chatHistoryA = [];
  chatHistoryB = [];
  $('col-a').innerHTML = '';
  $('col-b').innerHTML = '';
  sessionTotals = { a: { in: 0, out: 0, ms: 0, turns: 0 }, b: { in: 0, out: 0, ms: 0, turns: 0 } };
  renderSlotMetrics('a'); renderSlotMetrics('b');
  await window.sassy.session.clearOverlays();
  $('overlay-text-a').value = '';
  $('overlay-text-b').value = '';
  $('overlay-btn-a').classList.remove('active');
  $('overlay-btn-b').classList.remove('active');
  $('btn-send').disabled = false;
  $('btn-stop').style.display = 'none';
  setStatus('a', 'idle'); setStatus('b', 'idle');
  $('hint').textContent = 'new session — overlays cleared';
  showEmptyStates();
}

function showEmptyStates() {
  for (const slot of ['a', 'b']) {
    const col = $(`col-${slot}`);
    if (col.children.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty-state';
      const pid = $(`provider-${slot}`).value;
      const p = providerById[pid];
      e.innerHTML = `<strong>SLOT ${slot.toUpperCase()}</strong><br>${p ? p.label : ''}<br>send a prompt to begin`;
      col.appendChild(e);
    }
  }
}

async function toSetup() { await window.sassy.nav.toSetup(); }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── Chunk/done listeners ────────────────────────────────────
window.sassy.ai.onChunk(({ signal_id, provider, text }) => {
  // Route to the slot whose current signal matches
  for (const slot of ['a', 'b']) {
    if (currentSlotSignals[slot] === signal_id) {
      currentSlotBuffers[slot] += text;
      const el = currentSlotBodyEls[slot];
      if (el) {
        el.innerHTML = renderMarkdown(currentSlotBuffers[slot]) +
          '<span class="typing-cursor">▊</span>';
        const col = $(`col-${slot}`);
        col.scrollTop = col.scrollHeight;
      }
      return;
    }
  }
});

window.sassy.ai.onDone(({ signal_id, provider, aborted, meta }) => {
  activeStreams.delete(signal_id);
  for (const slot of ['a', 'b']) {
    if (currentSlotSignals[slot] === signal_id) {
      finalizeBody(currentSlotBodyEls[slot], currentSlotBuffers[slot]);

      // Turn-level metrics footer + raw text toggle.
      attachTurnFooter(slot, meta, currentSlotBuffers[slot]);

      // Session totals displayed in the slot header.
      if (meta && !aborted) {
        const t = sessionTotals[slot];
        t.turns += 1;
        if (typeof meta.input === 'number') t.in += meta.input;
        if (typeof meta.output === 'number') t.out += meta.output;
        if (meta.endedAt && meta.startedAt) t.ms += (meta.endedAt - meta.startedAt);
        renderSlotMetrics(slot);
      }

      setStatus(slot, aborted ? 'aborted' : 'idle');
      currentSlotSignals[slot] = null;
    }
  }
});

// ── Init ────────────────────────────────────────────────────
async function init() {
  $('ver').textContent = 'v' + await window.sassy.app.version();

  await loadProviders();

  const prefs = await window.sassy.prefs.get();
  const has = await window.sassy.keys.has();

  // Restore slot A
  const pickable = PROVIDERS.filter(p => !p.needsKey || has[p.id]);
  const fallbackA = pickable[0] && pickable[0].id;
  const fallbackB = pickable[1] ? pickable[1].id : fallbackA;

  const chosenA = (prefs.slotA && (!providerById[prefs.slotA].needsKey || has[prefs.slotA])) ? prefs.slotA : fallbackA;
  const chosenB = (prefs.slotB && (!providerById[prefs.slotB].needsKey || has[prefs.slotB])) ? prefs.slotB : fallbackB;

  if (chosenA) { $('provider-a').value = chosenA; populateModelDatalist('a', chosenA); }
  if (chosenB) { $('provider-b').value = chosenB; populateModelDatalist('b', chosenB); }

  updateSystemRow();
  $('provider-a').addEventListener('change', updateSystemRow);
  $('provider-b').addEventListener('change', updateSystemRow);

  if (prefs.modelA) $('model-a').value = prefs.modelA;
  if (prefs.modelB) $('model-b').value = prefs.modelB;

  showEmptyStates();

  $('prompt-input').addEventListener('input', () => autoResize($('prompt-input')));
  $('prompt-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
}

init();
</script>
