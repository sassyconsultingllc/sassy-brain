<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
  <title>Sassy Brain</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #27272a;
      --surface3: #3f3f46;
      --border: #3f3f46;
      --text: #fafafa;
      --text2: #a1a1aa;
      --text3: #71717a;
      --accent: #f97316;
      --accent2: #ea580c;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --claude: #d97706;
      --grok: #3b82f6;
      --consensus: #22c55e;
      --radius: 12px;
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    .topbar {
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      gap: 12px;
    }

    .topbar-logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 14px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar-mode {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 2px;
      background: var(--bg);
      border-radius: 8px;
      padding: 2px;
    }

    .mode-btn {
      padding: 4px 12px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--mono);
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--surface2);
      color: var(--text);
    }
    .mode-btn:hover:not(.active) { color: var(--text); }

    .topbar-spacer { flex: 1; }

    .topbar-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      font-family: var(--mono);
      transition: color 0.2s;
    }
    .topbar-btn:hover { color: var(--text); }

    /* ── Chat area ───────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 800px;
      margin: 0 auto 16px auto;
      padding: 0 24px;
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }
    .msg-user .msg-bubble {
      background: var(--surface2);
      border-radius: 16px 16px 4px 16px;
      padding: 12px 18px;
      max-width: 70%;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg-ai {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-source {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .msg-source-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .msg-source-dot.claude { background: var(--claude); }
    .msg-source-dot.grok { background: var(--grok); }
    .msg-source-dot.consensus { background: var(--consensus); }
    .msg-source-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .msg-source-name.claude { color: var(--claude); }
    .msg-source-name.grok { color: var(--grok); }
    .msg-source-name.consensus { color: var(--consensus); }

    .msg-body {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }
    .msg-body code {
      font-family: var(--mono);
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .msg-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Consensus debate panel (shown during deliberation) ── */
    .debate-panel {
      max-width: 800px;
      margin: 0 auto 16px auto;
      padding: 0 24px;
    }

    .debate-container {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }

    .debate-header {
      padding: 10px 16px;
      background: var(--surface2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .debate-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .debate-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 80px;
    }

    .debate-col {
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text2);
      max-height: 200px;
      overflow-y: auto;
    }
    .debate-col + .debate-col {
      border-left: 1px solid var(--border);
    }

    .debate-col-header {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .debate-col-header.claude { color: var(--claude); }
    .debate-col-header.grok { color: var(--grok); }

    /* ── Message queue (steering) ────────────────────────── */
    .queue-area {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 8px 24px;
    }
    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--text2);
    }
    .queue-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--accent);
    }
    .queue-text { flex: 1; }
    .queue-remove {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
    }

    /* ── Input area ──────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text3); }

    .send-group {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    .btn-send {
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 12px 0 0 12px;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-send:hover { background: var(--accent2); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-send-dropdown {
      padding: 12px 8px;
      background: var(--accent2);
      border: none;
      border-radius: 0 12px 12px 0;
      border-left: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 10px;
      cursor: pointer;
      position: relative;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      bottom: 100%;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      min-width: 200px;
      margin-bottom: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 100;
    }
    .dropdown-menu.show { display: block; }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: var(--text);
      text-align: left;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.1s;
    }
    .dropdown-item:hover { background: var(--surface2); }
    .dropdown-item .di-label {
      font-weight: 600;
      display: block;
    }
    .dropdown-item .di-desc {
      font-size: 11px;
      color: var(--text2);
    }

    /* ── Status bar ──────────────────────────────────────── */
    .statusbar {
      height: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      flex-shrink: 0;
    }
    .status-item {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* ── Settings panel overlay ──────────────────────────── */
    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .settings-overlay.show { display: flex; }
    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .settings-title {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }
    .setting-label small {
      display: block;
      font-weight: 400;
      color: var(--text2);
      font-size: 11px;
    }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar-logo">SASSY BRAIN</span>
    <div class="topbar-mode">
      <button class="mode-btn active" data-mode="consensus" onclick="setMode('consensus')">⚡ Consensus</button>
      <button class="mode-btn" data-mode="claude" onclick="setMode('claude')">Claude</button>
      <button class="mode-btn" data-mode="grok" onclick="setMode('grok')">Grok</button>
    </div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="newChat()">+ New</button>
    <button class="topbar-btn" onclick="toggleSettings()">⚙</button>
    <button class="topbar-btn" onclick="window.sassy.nav.toSetup()">🔑</button>
  </div>

  <!-- Chat Messages -->
  <div class="chat-area" id="chat-area"></div>

  <!-- Queued Messages -->
  <div class="queue-area" id="queue-area"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-container">
      <div class="input-wrap">
        <textarea id="input" placeholder="Ask something..." rows="1"
          oninput="autoResize(this)"></textarea>
      </div>
      <div class="send-group">
        <button class="btn-send" id="btn-send" onclick="handleSend()">Send</button>
        <button class="btn-send-dropdown" id="btn-dropdown" onclick="toggleDropdown()">▾
          <div class="dropdown-menu" id="dropdown-menu">
            <button class="dropdown-item" onclick="handleSendAction('send')">
              <span class="di-label">Send</span>
              <span class="di-desc">Wait for current response, then send</span>
            </button>
            <button class="dropdown-item" onclick="handleSendAction('queue')">
              <span class="di-label">Add to Queue</span>
              <span class="di-desc">Queue after current response completes</span>
            </button>
            <button class="dropdown-item" onclick="handleSendAction('steer')">
              <span class="di-label">Steer with Message</span>
              <span class="di-desc">Interrupt current response, send immediately</span>
            </button>
            <button class="dropdown-item" onclick="handleSendAction('stop')">
              <span class="di-label">Stop and Send</span>
              <span class="di-desc">Cancel current response, send new</span>
            </button>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-item" id="status-claude">
      <div class="status-dot" style="background:var(--claude)"></div>
      Claude: <span id="status-claude-text">idle</span>
    </div>
    <div class="status-item" id="status-grok">
      <div class="status-dot" style="background:var(--grok)"></div>
      Grok: <span id="status-grok-text">idle</span>
    </div>
    <div class="status-item" id="status-mode">
      Mode: <span id="status-mode-text">consensus</span>
    </div>
    <div class="status-item" style="margin-left:auto">
      v<span id="status-version">0.1.0</span>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)toggleSettings()">
    <div class="settings-panel">
      <div class="settings-title">Settings</div>
      <div class="setting-row">
        <div class="setting-label">Claude Model<small>Anthropic model for responses</small></div>
        <select id="pref-claudeModel" onchange="savePref('claudeModel', this.value)">
          <option value="claude-sonnet-4-20250514">Sonnet 4</option>
          <option value="claude-opus-4-20250514">Opus 4</option>
          <option value="claude-haiku-4-20250514">Haiku 4</option>
        </select>
      </div>
      <div class="setting-row">
        <div class="setting-label">Grok Model<small>xAI model for responses</small></div>
        <select id="pref-grokModel" onchange="savePref('grokModel', this.value)">
          <option value="grok-3">Grok 3</option>
          <option value="grok-3-fast">Grok 3 Fast</option>
          <option value="grok-4-heavy">Grok 4 Heavy</option>
        </select>
      </div>
      <div class="setting-row">
        <div class="setting-label">Consensus Turns<small>Debate rounds before presenting answer</small></div>
        <select id="pref-consensusTurns" onchange="savePref('consensusTurns', parseInt(this.value))">
          <option value="1">1 round</option>
          <option value="2">2 rounds (default)</option>
          <option value="3">3 rounds</option>
        </select>
      </div>
      <div class="setting-row">
        <div class="setting-label">Default Send Action<small>When request is in-flight</small></div>
        <select id="pref-steeringAction" onchange="savePref('steeringAction', this.value)">
          <option value="steer">Steer (interrupt)</option>
          <option value="queue">Queue (wait)</option>
          <option value="stop">Stop and Send</option>
        </select>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════
// SASSY BRAIN — Renderer Logic
// Consensus engine, async steering, streaming display
// ═══════════════════════════════════════════════════════════════════

let currentMode = 'consensus'; // consensus | claude | grok
let isStreaming = false;
let activeSignals = new Set(); // track active stream IDs
let messageQueue = [];
let chatHistory = []; // full conversation for API context
let streamBuffers = {}; // accumulate stream text per signal_id
let signalCounter = 0;
let currentAbortController = null;

// ── Init ────────────────────────────────────────────────────────
async function init() {
  const version = await window.sassy.app.version();
  document.getElementById('status-version').textContent = version;

  const prefs = await window.sassy.prefs.get();
  if (prefs.claudeModel) document.getElementById('pref-claudeModel').value = prefs.claudeModel;
  if (prefs.grokModel) document.getElementById('pref-grokModel').value = prefs.grokModel;
  if (prefs.consensusTurns) document.getElementById('pref-consensusTurns').value = prefs.consensusTurns;
  if (prefs.steeringAction) document.getElementById('pref-steeringAction').value = prefs.steeringAction;
  if (prefs.defaultMode) { currentMode = prefs.defaultMode; setMode(currentMode); }

  // Set up chunk listener
  window.sassy.ai.onChunk((data) => {
    const { signal_id, provider, text } = data;
    if (!streamBuffers[signal_id]) streamBuffers[signal_id] = '';
    streamBuffers[signal_id] += text;
    updateStreamingMessage(signal_id, provider, streamBuffers[signal_id]);
  });

  window.sassy.ai.onDone((data) => {
    const { signal_id, provider } = data;
    activeSignals.delete(signal_id);
    finalizeMessage(signal_id, provider);
    setProviderStatus(provider, 'idle');

    if (activeSignals.size === 0) {
      isStreaming = false;
      updateSendButton();
      processQueue();
    }
  });

  const hasKeys = await window.sassy.keys.has();
  // Show welcome message
  addSystemMessage(
    `Welcome to Sassy Brain.` +
    (hasKeys.anthropic && hasKeys.grok
      ? ' Both AI engines connected — Consensus Mode active.'
      : hasKeys.anthropic ? ' Claude connected. Add Grok key for Consensus Mode.'
      : ' Grok connected. Add Claude key for Consensus Mode.')
  );
}

// ── Mode management ─────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('status-mode-text').textContent = mode;
  window.sassy.prefs.set('defaultMode', mode);
}

// ── Message rendering ───────────────────────────────────────────
function addUserMessage(text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message msg-user';
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
  area.appendChild(div);
  scrollToBottom();
}

function addSystemMessage(text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message msg-ai';
  div.innerHTML = `
    <div class="msg-source">
      <div class="msg-source-dot consensus"></div>
      <span class="msg-source-name consensus">system</span>
    </div>
    <div class="msg-body">${text}</div>`;
  area.appendChild(div);
  scrollToBottom();
}

function createStreamingMessage(signalId, provider) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message msg-ai';
  div.id = `msg-${signalId}`;
  div.innerHTML = `
    <div class="msg-source">
      <div class="msg-source-dot ${provider}"></div>
      <span class="msg-source-name ${provider}">${provider}</span>
    </div>
    <div class="msg-body" id="body-${signalId}"><span class="typing-cursor">▊</span></div>`;
  area.appendChild(div);
  scrollToBottom();
  return div;
}

function createDebatePanel() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'debate-panel';
  div.id = 'debate-active';
  div.innerHTML = `
    <div class="debate-container">
      <div class="debate-header">
        <div class="debate-spinner"></div>
        <span>Consensus deliberation in progress...</span>
      </div>
      <div class="debate-columns">
        <div class="debate-col">
          <div class="debate-col-header claude">Claude</div>
          <div id="debate-claude-text">Thinking...</div>
        </div>
        <div class="debate-col">
          <div class="debate-col-header grok">Grok</div>
          <div id="debate-grok-text">Thinking...</div>
        </div>
      </div>
    </div>`;
  area.appendChild(div);
  scrollToBottom();
  return div;
}

function updateStreamingMessage(signalId, provider, fullText) {
  const body = document.getElementById(`body-${signalId}`);
  if (body) {
    body.innerHTML = renderMarkdown(fullText) + '<span class="typing-cursor" style="color:var(--accent);animation:blink 1s infinite">▊</span>';
    scrollToBottom();
  }
}

function finalizeMessage(signalId, provider) {
  const body = document.getElementById(`body-${signalId}`);
  if (body) {
    const cursor = body.querySelector('.typing-cursor');
    if (cursor) cursor.remove();
  }
}

// ── Core send logic ─────────────────────────────────────────────
async function handleSend() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  if (isStreaming) {
    // Use configured default steering action
    const prefs = await window.sassy.prefs.get();
    const action = prefs.steeringAction || 'steer';
    handleSendAction(action);
    return;
  }

  input.value = '';
  autoResize(input);
  sendMessage(text);
}

async function handleSendAction(action) {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  closeDropdown();
  input.value = '';
  autoResize(input);

  switch (action) {
    case 'send':
      if (!isStreaming) {
        sendMessage(text);
      } else {
        // Wait, then send (acts like queue that auto-fires)
        messageQueue.push(text);
        renderQueue();
      }
      break;

    case 'queue':
      messageQueue.push(text);
      renderQueue();
      break;

    case 'steer':
      // Let current request finish its current tool/step, then interject
      // We append the steer message to history so the next round sees it
      addUserMessage(`↪ ${text}`);
      chatHistory.push({ role: 'user', content: `[STEERING] The user is redirecting: ${text}` });
      // Don't interrupt the stream — it'll pick this up in the next consensus round
      // or if in single mode, we queue it
      messageQueue.unshift(text);
      renderQueue();
      break;

    case 'stop':
      // Cancel everything and send fresh
      activeSignals.clear();
      isStreaming = false;
      streamBuffers = {};
      updateSendButton();
      sendMessage(text);
      break;
  }
}

async function sendMessage(text) {
  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });
  isStreaming = true;
  updateSendButton();

  const hasKeys = await window.sassy.keys.has();

  if (currentMode === 'consensus' && hasKeys.anthropic && hasKeys.grok) {
    await runConsensus(text);
  } else if (currentMode === 'claude' || (currentMode === 'consensus' && hasKeys.anthropic && !hasKeys.grok)) {
    await runSingle('anthropic', text);
  } else if (currentMode === 'grok' || (currentMode === 'consensus' && !hasKeys.anthropic && hasKeys.grok)) {
    await runSingle('grok', text);
  } else {
    addSystemMessage('No API keys configured. Click 🔑 to set up.');
    isStreaming = false;
    updateSendButton();
  }
}

// ── Single-provider streaming ───────────────────────────────────
async function runSingle(provider, text) {
  const sid = `s${++signalCounter}`;
  activeSignals.add(sid);
  streamBuffers[sid] = '';

  setProviderStatus(provider, 'streaming...');
  createStreamingMessage(sid, provider);

  const messages = chatHistory.map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.content
  }));

  const result = await window.sassy.ai.stream({
    provider,
    messages,
    signal_id: sid
  });

  if (result.error) {
    addSystemMessage(`Error from ${provider}: ${result.error}`);
    activeSignals.delete(sid);
    isStreaming = false;
    setProviderStatus(provider, 'error');
    updateSendButton();
    return;
  }

  // Completion handled by onDone listener
  // After done, save to history
  const waitForDone = () => new Promise(resolve => {
    const check = setInterval(() => {
      if (!activeSignals.has(sid)) {
        clearInterval(check);
        resolve();
      }
    }, 100);
  });

  await waitForDone();

  if (streamBuffers[sid]) {
    chatHistory.push({ role: 'assistant', content: streamBuffers[sid] });
  }
}

// ── Consensus Engine ────────────────────────────────────────────
// 1. Send user prompt to both Claude and Grok simultaneously
// 2. Show their responses in a debate panel (side by side, streaming)
// 3. Each reads the other's response and refines (consensusTurns rounds)
// 4. Final merged answer presented to user
async function runConsensus(text) {
  const prefs = await window.sassy.prefs.get();
  const turns = prefs.consensusTurns || 2;

  setProviderStatus('claude', 'deliberating...');
  setProviderStatus('grok', 'deliberating...');

  const debatePanel = createDebatePanel();

  const systemPrompt = `You are participating in a consensus-finding process with another AI. 
Your goal is to provide the most accurate, helpful, and truthful response possible. 
After seeing the other AI's perspective, refine your answer to incorporate valid points 
while maintaining intellectual honesty. If you disagree on facts, explain why with evidence.
The user should receive the best possible unified answer.`;

  // Build messages for each provider
  const claudeMessages = [
    { role: 'user', content: text }
  ];
  const grokMessages = [
    { role: 'system', content: systemPrompt },
    { role: 'user', content: text }
  ];

  // Round 1: Both respond independently (async parallel)
  let claudeResponse = '';
  let grokResponse = '';

  const [claudeR1, grokR1] = await Promise.all([
    (async () => {
      const res = await window.sassy.ai.complete({
        provider: 'anthropic',
        messages: claudeMessages
      });
      return res.text || res.error || '';
    })(),
    (async () => {
      const res = await window.sassy.ai.complete({
        provider: 'grok',
        messages: grokMessages
      });
      return res.text || res.error || '';
    })()
  ]);

  claudeResponse = claudeR1;
  grokResponse = grokR1;

  // Update debate panel
  updateDebateText('claude', claudeResponse);
  updateDebateText('grok', grokResponse);

  // Deliberation rounds
  for (let round = 1; round < turns; round++) {
    updateDebateHeader(`Round ${round + 1}/${turns} — refining...`);

    const [claudeRn, grokRn] = await Promise.all([
      (async () => {
        const msgs = [
          { role: 'user', content: text },
          { role: 'assistant', content: claudeResponse },
          { role: 'user', content: `Another AI (Grok) responded to the same question:\n\n"${grokResponse}"\n\nRefine your answer, incorporating any valid points from their perspective. If you disagree on facts, explain why. Produce a final, authoritative response.` }
        ];
        const res = await window.sassy.ai.complete({ provider: 'anthropic', messages: msgs });
        return res.text || claudeResponse;
      })(),
      (async () => {
        const msgs = [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text },
          { role: 'assistant', content: grokResponse },
          { role: 'user', content: `Another AI (Claude) responded to the same question:\n\n"${claudeResponse}"\n\nRefine your answer, incorporating any valid points from their perspective. If you disagree on facts, explain why. Produce a final, authoritative response.` }
        ];
        const res = await window.sassy.ai.complete({ provider: 'grok', messages: msgs });
        return res.text || grokResponse;
      })()
    ]);

    claudeResponse = claudeRn;
    grokResponse = grokRn;

    updateDebateText('claude', claudeResponse);
    updateDebateText('grok', grokResponse);
  }

  // Final synthesis: Claude produces the merged answer
  updateDebateHeader('Synthesizing consensus...');

  const synthesisMessages = [
    { role: 'user', content: `Original question: "${text}"

Claude's final position:
${claudeResponse}

Grok's final position:
${grokResponse}

Synthesize both perspectives into a single, authoritative response. Where they agree, state the consensus confidently. Where they differ, present both views and indicate which has stronger evidence. Be concise but thorough. Do NOT mention "Claude" or "Grok" by name — present this as the unified truth.` }
  ];

  // Stream the final consensus answer
  const consSid = `cons${++signalCounter}`;
  activeSignals.add(consSid);
  streamBuffers[consSid] = '';

  // Collapse debate panel
  debatePanel.querySelector('.debate-header').innerHTML = `
    <span style="color:var(--green)">✓</span>
    <span>Deliberation complete (${turns} rounds)</span>`;

  createStreamingMessage(consSid, 'consensus');

  setProviderStatus('claude', 'synthesizing...');
  setProviderStatus('grok', 'idle');

  await window.sassy.ai.stream({
    provider: 'anthropic',
    messages: synthesisMessages,
    signal_id: consSid
  });

  // Wait for done
  await new Promise(resolve => {
    const check = setInterval(() => {
      if (!activeSignals.has(consSid)) {
        clearInterval(check);
        resolve();
      }
    }, 100);
  });

  if (streamBuffers[consSid]) {
    chatHistory.push({ role: 'assistant', content: streamBuffers[consSid] });
  }

  setProviderStatus('claude', 'idle');
  setProviderStatus('grok', 'idle');
  isStreaming = false;
  updateSendButton();
  processQueue();
}

// ── Debate panel helpers ────────────────────────────────────────
function updateDebateText(provider, text) {
  const el = document.getElementById(`debate-${provider}-text`);
  if (el) {
    el.textContent = text.length > 500 ? text.substring(0, 500) + '...' : text;
    el.parentElement.scrollTop = el.parentElement.scrollHeight;
  }
}

function updateDebateHeader(text) {
  const panel = document.getElementById('debate-active');
  if (panel) {
    const header = panel.querySelector('.debate-header span');
    if (header) header.textContent = text;
  }
}

// ── Queue management ────────────────────────────────────────────
function renderQueue() {
  const area = document.getElementById('queue-area');
  area.innerHTML = messageQueue.map((msg, i) => `
    <div class="queue-item">
      <span class="queue-badge">Q${i + 1}</span>
      <span class="queue-text">${escapeHtml(msg.substring(0, 60))}${msg.length > 60 ? '...' : ''}</span>
      <button class="queue-remove" onclick="removeFromQueue(${i})">✕</button>
    </div>
  `).join('');
}

function removeFromQueue(index) {
  messageQueue.splice(index, 1);
  renderQueue();
}

function processQueue() {
  if (messageQueue.length > 0 && !isStreaming) {
    const next = messageQueue.shift();
    renderQueue();
    sendMessage(next);
  }
}

// ── UI helpers ──────────────────────────────────────────────────
function setProviderStatus(provider, status) {
  const map = { anthropic: 'claude', claude: 'claude', grok: 'grok', consensus: 'claude' };
  const el = document.getElementById(`status-${map[provider] || provider}-text`);
  if (el) el.textContent = status;
}

function updateSendButton() {
  const btn = document.getElementById('btn-send');
  const dropdown = document.getElementById('btn-dropdown');
  if (isStreaming) {
    btn.textContent = '⟳';
    dropdown.style.display = '';
  } else {
    btn.textContent = 'Send';
    dropdown.style.display = '';
  }
}

function toggleDropdown() {
  const menu = document.getElementById('dropdown-menu');
  menu.classList.toggle('show');
}

function closeDropdown() {
  document.getElementById('dropdown-menu').classList.remove('show');
}

// Close dropdown on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.send-group')) closeDropdown();
});

function toggleSettings() {
  document.getElementById('settings-overlay').classList.toggle('show');
}

async function savePref(key, value) {
  await window.sassy.prefs.set(key, value);
}

function newChat() {
  chatHistory = [];
  streamBuffers = {};
  activeSignals.clear();
  isStreaming = false;
  messageQueue = [];
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('queue-area').innerHTML = '';
  updateSendButton();
  addSystemMessage('New conversation started.');
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMarkdown(text) {
  // Lightweight markdown: code blocks, inline code, bold, italic
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

// Keyboard shortcuts
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ── Kick it off ─────────────────────────────────────────────────
init();
</script>
